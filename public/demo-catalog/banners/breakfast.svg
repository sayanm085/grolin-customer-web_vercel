<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900'>
  <defs>
    <radialGradient id='g1' cx='68%' cy='42%' r='58%'>
      <stop offset='0%' stop-color='#C27C18' stop-opacity='0.68'/>
      <stop offset='100%' stop-color='#C27C18' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g2' cx='22%' cy='58%' r='46%'>
      <stop offset='0%' stop-color='#8B4513' stop-opacity='0.55'/>
      <stop offset='100%' stop-color='#8B4513' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g3' cx='85%' cy='10%' r='36%'>
      <stop offset='0%' stop-color='#E3B93C' stop-opacity='0.42'/>
      <stop offset='100%' stop-color='#E3B93C' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g4' cx='40%' cy='88%' r='34%'>
      <stop offset='0%' stop-color='#16945E' stop-opacity='0.22'/>
      <stop offset='100%' stop-color='#16945E' stop-opacity='0'/>
    </radialGradient>
    <filter id='soft'>
      <feGaussianBlur stdDeviation='70'/>
    </filter>
  </defs>

  <!-- Deep warm-dark base -->
  <rect width='1600' height='900' fill='#100A04'/>

  <!-- Colour glow layers -->
  <ellipse cx='1088' cy='378' rx='580' ry='460' fill='#C27C18' opacity='0.55' filter='url(#soft)'/>
  <ellipse cx='320' cy='540' rx='440' ry='360' fill='#7A3B10' opacity='0.50' filter='url(#soft)'/>
  <ellipse cx='1360' cy='100' rx='340' ry='260' fill='#E3B93C' opacity='0.36' filter='url(#soft)'/>
  <ellipse cx='640' cy='820' rx='300' ry='220' fill='#16945E' opacity='0.20' filter='url(#soft)'/>

  <!-- Radial gradient fills -->
  <rect width='1600' height='900' fill='url(#g1)'/>
  <rect width='1600' height='900' fill='url(#g2)'/>
  <rect width='1600' height='900' fill='url(#g3)'/>
  <rect width='1600' height='900' fill='url(#g4)'/>

  <!-- Decorative rings -->
  <circle cx='1340' cy='140' r='200' fill='none' stroke='#E3B93C' stroke-width='1.2' opacity='0.24'/>
  <circle cx='1340' cy='140' r='120' fill='none' stroke='#E3B93C' stroke-width='0.8' opacity='0.16'/>
  <circle cx='180' cy='760' r='260' fill='none' stroke='#C27C18' stroke-width='1' opacity='0.16'/>
  <circle cx='180' cy='760' r='160' fill='none' stroke='#C27C18' stroke-width='0.6' opacity='0.10'/>

  <!-- Cross-hair accent -->
  <line x1='1340' y1='100' x2='1340' y2='180' stroke='#E3B93C' stroke-width='1' opacity='0.35'/>
  <line x1='1300' y1='140' x2='1380' y2='140' stroke='#E3B93C' stroke-width='1' opacity='0.35'/>

  <!-- Floating accent dots -->
  <circle cx='760' cy='160' r='5' fill='#E3B93C' opacity='0.70'/>
  <circle cx='1080' cy='700' r='4' fill='#C27C18' opacity='0.55'/>
  <circle cx='420' cy='220' r='3.5' fill='#16945E' opacity='0.50'/>
  <circle cx='1460' cy='580' r='3' fill='#ffffff' opacity='0.22'/>
  <circle cx='680' cy='840' r='3' fill='#E3B93C' opacity='0.35'/>

  <!-- Subtle diagonal light streak -->
  <line x1='800' y1='0' x2='1600' y2='560' stroke='#ffffff' stroke-width='120' opacity='0.028'/>
</svg>
