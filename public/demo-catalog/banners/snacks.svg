<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900'>
  <defs>
    <radialGradient id='g1' cx='70%' cy='40%' r='56%'>
      <stop offset='0%' stop-color='#6E49D8' stop-opacity='0.72'/>
      <stop offset='100%' stop-color='#6E49D8' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g2' cx='20%' cy='60%' r='48%'>
      <stop offset='0%' stop-color='#4A2CA8' stop-opacity='0.58'/>
      <stop offset='100%' stop-color='#4A2CA8' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g3' cx='88%' cy='12%' r='38%'>
      <stop offset='0%' stop-color='#9B6DFF' stop-opacity='0.40'/>
      <stop offset='100%' stop-color='#9B6DFF' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='g4' cx='45%' cy='85%' r='35%'>
      <stop offset='0%' stop-color='#E3B93C' stop-opacity='0.32'/>
      <stop offset='100%' stop-color='#E3B93C' stop-opacity='0'/>
    </radialGradient>
    <filter id='soft'>
      <feGaussianBlur stdDeviation='68'/>
    </filter>
  </defs>

  <!-- Deep dark-violet base -->
  <rect width='1600' height='900' fill='#080614'/>

  <!-- Colour glow layers -->
  <ellipse cx='1120' cy='360' rx='600' ry='480' fill='#6E49D8' opacity='0.60' filter='url(#soft)'/>
  <ellipse cx='280' cy='560' rx='460' ry='380' fill='#3D1FA0' opacity='0.52' filter='url(#soft)'/>
  <ellipse cx='1380' cy='110' rx='350' ry='270' fill='#9B6DFF' opacity='0.34' filter='url(#soft)'/>
  <ellipse cx='760' cy='830' rx='320' ry='240' fill='#E3B93C' opacity='0.26' filter='url(#soft)'/>

  <!-- Radial gradient fills -->
  <rect width='1600' height='900' fill='url(#g1)'/>
  <rect width='1600' height='900' fill='url(#g2)'/>
  <rect width='1600' height='900' fill='url(#g3)'/>
  <rect width='1600' height='900' fill='url(#g4)'/>

  <!-- Decorative rings -->
  <circle cx='1360' cy='150' r='210' fill='none' stroke='#9B6DFF' stroke-width='1.2' opacity='0.26'/>
  <circle cx='1360' cy='150' r='130' fill='none' stroke='#9B6DFF' stroke-width='0.8' opacity='0.18'/>
  <circle cx='160' cy='750' r='270' fill='none' stroke='#6E49D8' stroke-width='1' opacity='0.18'/>
  <circle cx='160' cy='750' r='170' fill='none' stroke='#6E49D8' stroke-width='0.6' opacity='0.12'/>

  <!-- Cross-hair accent -->
  <line x1='1360' y1='110' x2='1360' y2='190' stroke='#9B6DFF' stroke-width='1' opacity='0.40'/>
  <line x1='1320' y1='150' x2='1400' y2='150' stroke='#9B6DFF' stroke-width='1' opacity='0.40'/>

  <!-- Floating accent dots -->
  <circle cx='800' cy='170' r='5' fill='#9B6DFF' opacity='0.75'/>
  <circle cx='1100' cy='690' r='4' fill='#E3B93C' opacity='0.60'/>
  <circle cx='400' cy='230' r='3.5' fill='#6E49D8' opacity='0.55'/>
  <circle cx='1470' cy='600' r='3' fill='#ffffff' opacity='0.25'/>
  <circle cx='660' cy='830' r='3' fill='#9B6DFF' opacity='0.40'/>

  <!-- Subtle diagonal light streak -->
  <line x1='860' y1='0' x2='1600' y2='520' stroke='#ffffff' stroke-width='130' opacity='0.026'/>
</svg>
